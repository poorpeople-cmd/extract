name: Extract M3U8 Link and Record Video

on:
  workflow_dispatch:

jobs:
  run-puppeteer-script:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20' 

      # Zaroori packages install karna
      - name: Install Dependencies
        run: npm install puppeteer puppeteer-screen-recorder fs path

      # Code chalana (Proxy ab direct js file ke andar hai)
      - name: Run Extraction Code
        run: node extract.js

      # Videos folder ko Artifacts mein upload karna
      - name: Upload Video Artifact
        uses: actions/upload-artifact@v4
        with:
          name: stream-video-record
          path: videos/ 
          retention-days: 5
