name: Extract M3U8 Link and Screenshots

on:
  workflow_dispatch:

jobs:
  run-puppeteer-script:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20' 

      - name: Install Dependencies
        run: npm install puppeteer fs path

      - name: Run Extraction Code
        run: node extract.js

      # Step 5: Screenshots folder ko Artifacts mein upload karna
      - name: Upload Screenshots Artifact
        uses: actions/upload-artifact@v4
        with:
          name: stream-screenshots # Artifact ka naam (zip file ka naam banega)
          path: screenshots/ # Konsa folder upload karna hai
          retention-days: 5 # Screenshots kitne din tak save rahein (optional)
